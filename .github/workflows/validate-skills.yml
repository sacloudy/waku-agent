name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  skills-and-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e '.[dev]'
      - name: Validate skills (community PRs land here)
        run: python scripts/validate_skills.py
      - name: Deterministic evals (offline tier — no API key in CI)
        run: python -m pytest -q evals/deterministic
